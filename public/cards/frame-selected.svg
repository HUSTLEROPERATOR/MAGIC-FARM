<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="selBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#e0c068" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Subtle selection border -->
  <rect x="2" y="2" width="196" height="296" rx="12" fill="none"
        stroke="url(#selBorder)" stroke-width="2"/>

  <!-- Inner accent -->
  <rect x="6" y="6" width="188" height="288" rx="10" fill="none"
        stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
</svg>

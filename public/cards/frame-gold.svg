<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0.8 0.2 0 0
                0.8 0.6 0.1 0 0
                0.2 0.1 0   0 0
                0   0   0   0.6 0" result="gold"/>
      <feMerge>
        <feMergeNode in="gold"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>
  </defs>

  <!-- Outer glow border -->
  <rect x="2" y="2" width="196" height="296" rx="12" fill="none"
        stroke="url(#goldBorder)" stroke-width="3" filter="url(#goldGlow)"/>

  <!-- Inner accent border -->
  <rect x="7" y="7" width="186" height="286" rx="10" fill="none"
        stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner sparkles -->
  <text x="16" y="22" font-size="8" fill="#f0d060" opacity="0.7">✦</text>
  <text x="180" y="22" font-size="8" fill="#f0d060" opacity="0.7">✦</text>
  <text x="16" y="294" font-size="8" fill="#f0d060" opacity="0.7">✦</text>
  <text x="180" y="294" font-size="8" fill="#f0d060" opacity="0.7">✦</text>
</svg>

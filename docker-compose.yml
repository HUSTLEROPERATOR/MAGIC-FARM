services:
  postgres:
    image: postgres:16-alpine
    container_name: magic-farm-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: magic_farm
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
